spring.application.name=Auth

spring.datasource.url=jdbc:postgresql://localhost:5433/authdb
spring.datasource.username=admin
spring.datasource.password=admin

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

logging.level.org.springframework.security=INFO

spring.docker.compose.enabled=false

springdoc.swagger-ui.path=/swagger

#### EMAIL ####

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

VERIFICATION_CODE_EXPIRATION=${VERIFICATION_CODE_EXPIRATION}

##### LOGS #####

logging.level.com.api.auth=INFO
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{requestId:-N/A}] %logger{36} - %msg%n
